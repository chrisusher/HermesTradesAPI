services:
  azurite:
    image: 'mcr.microsoft.com/azure-storage/azurite:latest'
    ports:
      - 10000:10000
      - 10001:10001
      - 10002:10002
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:10000/']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s