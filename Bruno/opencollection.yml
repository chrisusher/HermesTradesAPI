opencollection: 1.0.0

info:
  name: HermesTradesAPI
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: apikey
    key: x-api-key
    value: "{{API_KEY}}"
    placement: header
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
