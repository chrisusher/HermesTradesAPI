info:
  name: Sell Portfolio Stock
  type: http
  seq: 2

http:
  method: POST
  url: "{{HOST}}:{{PORT}}/api/v1/{{USER_ID}}/portfolios/{{PORTFOLIO_ID}}/stocks/sell"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "date": "2026-06-26T00:00:00Z",
        "symbol": "MSFT",
        "price": 90.00,
        "quantity": 1,
        "totalCost": 90.00,
        "type": "MARKET_SELL"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
